[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持

;设置规则标志位

;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=DIRECT,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/LocalAreaNetwork.yaml,28800
;B站直连和港澳台
ruleset=🎥 B站视频,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/Bilibili.yaml,28800
;常用学术网站
ruleset=🎓 学术网站,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/Scholar.yaml,28800
;微软服务
ruleset=Ⓜ️ 微软服务,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/Bing.yaml,28800
ruleset=Ⓜ️ 微软服务,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/OneDrive.yaml,28800
ruleset=Ⓜ️ 微软服务,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/Microsoft.yaml,28800
;广告屏蔽
ruleset=REJECT,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/BanAD.yaml,28800
ruleset=REJECT,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/BanProgramAD.yaml,28800
;本项目收录的直连规则
ruleset=DIRECT,clash-domain:https://cdn.jsdmirror.com/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://cdn.jsdmirror.com/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
;Steam CDN
ruleset=DIRECT,clash-classic:https://cdn.jsdmirror.com/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
;本项目收录的代理规则
ruleset=🚀 节点选择,clash-domain:https://cdn.jsdmirror.com/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 节点选择,clash-classic:https://cdn.jsdmirror.com/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
;GFWList
ruleset=🚀 节点选择,clash-classic:https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/ProxyGFWlist.yaml,28800
;基本GEOData
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
;非标端口直连
ruleset=DIRECT,clash-classic:https://cdn.jsdmirror.com/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
;兜底选择
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位

;设置分组标志位
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇺🇲 美国节点`[]🚀 手动切换
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎥 B站视频`select`[]DIRECT`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🚀 节点选择
custom_proxy_group=🎓 学术网站`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🇭🇰 香港节点`url-test`(🇭🇰|港|\bHK\b|hk|Hong Kong|HongKong|hongkong|HONG KONG|HONGKONG|深港|HKG|九龙|Kowloon|新界|沙田|荃湾|葵涌)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(🇹🇼|🇼🇸|台|新北|彰化|\bTW\b|Taiwan|TAIWAN|TWN|TPE|ROC)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城节点`url-test`(🇸🇬|新加坡|坡|狮城|\bSG\b|Singapore|SINGAPORE|SIN)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(🇰🇷|\bKR\b|Korea|KOREA|KOR|首尔|韩|韓|春川|Chuncheon|ICN)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300
;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
